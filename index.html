<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time on Fire – Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #121212;
      color: #ffffff;
      text-align: center;
      padding: 2rem;
      margin: 0;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }
    input[type="email"] {
      padding: 0.8rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      margin-right: 0.5rem;
      width: 250px;
    }
    button {
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background-color: #ff5722;
      color: white;
      cursor: pointer;
    }
    form {
      margin-top: 1.5rem;
    }
    .g-recaptcha {
      margin-top: 1rem;
      display: inline-block;
    }
  </style>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <h1>🔥 Time on Fire</h1>
  <p>Our fitness timer app is almost ready.</p>
  <p>Sign up to be notified when we launch!</p>

  <form action="https://formspree.io/f/mjkwqrpy" method="POST">
    <input type="email" name="email" placeholder="Enter your email" required />
    
    <!-- Honeypot anti-bot field (invisible to users) -->
    <input type="text" name="_gotcha" style="display:none" />
    
    <!-- Google reCAPTCHA widget -->
    <div class="g-recaptcha" data-sitekey="6LedxkgrAAAAACwHZIT14Or8zm8Npo3fvfdnQyOZ"></div>
    
    <button type="submit">Notify me</button>
  </form>
</body>
</html>
